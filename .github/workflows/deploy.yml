name: Deploy to Production VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend-v2/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend-v2

      - name: Build frontend
        run: npm run build
        working-directory: frontend-v2
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_CF_TURNSTILE_SITE_KEY: ${{ secrets.VITE_CF_TURNSTILE_SITE_KEY }}

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/estoque_backend
            git pull origin main
            npm install --production
            pm2 restart backend || pm2 start server.js --name backend

      - name: Sync frontend build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "frontend-v2/dist/*"
          target: "/root/estoque_frontend/"
          strip_components: 2
